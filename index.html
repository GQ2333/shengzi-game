<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦐 小钳仙 · 生字闯关</title>
<script src="https://fastly.jsdelivr.net/npm/hanzi-writer@2.2/dist/hanzi-writer.min.js"></script>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-regular.css">
<style>
  @font-face {
    font-family: 'GameKaiTi';
    src: local('Kaiti SC'), local('楷体-简'), local('楷体'), local('KaiTi'), local('STKaiti'), local('Kai');
  }
  /* ========== 全局 ========== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #fef9e7 0%, #fdebd0 50%, #fce4cb 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  /* ========== 主容器 ========== */
  .container {
    width: 100%;
    max-width: 720px;
    background: #fffef7;
    border-radius: 32px;
    padding: 30px 24px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.12);
    position: relative;
    border: 3px solid #f5cba7;
  }
  /* 皮皮虾 header */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header .shrimp {
    font-size: 42px;
    display: block;
    margin-bottom: 2px;
  }
  .header h1 {
    font-size: 22px;
    color: #a04000;
    letter-spacing: 2px;
  }
  .header .subtitle {
    font-size: 13px;
    color: #b9770e;
    margin-top: 2px;
  }
  /* ========== 进度条 ========== */
  .progress-wrap {
    background: #fdf2e9;
    border-radius: 40px;
    height: 20px;
    position: relative;
    margin: 16px 0 24px;
    overflow: hidden;
    border: 2px solid #edbb99;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #f39c12, #e67e22, #d35400);
    border-radius: 40px;
    transition: width 0.5s ease;
  }
  .progress-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12px;
    font-weight: 700;
    color: #6e2c00;
    text-shadow: 0 0 6px #fff;
  }
  /* ========== 学习统计 ========== */
  .stats {
    display: flex;
    justify-content: space-around;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #6e2c00;
  }
  .stats span { display: flex; align-items: center; gap: 4px; }
  .stats .num { font-weight: 700; font-size: 16px; }
  .stat-pass .num { color: #27ae60; }
  .stat-fail .num { color: #e74c3c; }
  .stat-left .num { color: #b9770e; }
  /* ========== 卡片区 ========== */
  .card-zone {
    background: #fff;
    border-radius: 24px;
    padding: 28px 16px 20px;
    border: 2px dashed #f0c9a3;
    position: relative;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* —— 主字 —— */
  .main-char {
    font-size: 120px;
    font-weight: 700;
    color: #3e2723;
    line-height: 1.2;
    transition: transform 0.2s;
    user-select: none;
    cursor: default;
  }
  .main-char:hover { transform: scale(1.04); }

  /* —— 拼音 —— */
  .pinyin {
    font-size: 28px;
    color: #c0392b;
    margin-bottom: 4px;
    letter-spacing: 2px;
    min-height: 38px;
  }

  /* —— 组词 —— */
  .words {
    font-size: 16px;
    color: #7f8c8d;
    margin-bottom: 8px;
    min-height: 24px;
  }

  /* —— 跟读状态区 —— */
  .listen-status {
    font-size: 14px;
    min-height: 28px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }
  .listen-status.listening {
    color: #c0392b;
    font-weight: 600;
    animation: pulse 1s infinite;
  }
  .listen-status.result-pass {
    color: #27ae60;
    font-weight: 700;
  }
  .listen-status.result-fail {
    color: #e74c3c;
  }
  .listen-status.result-wait {
    color: #7f8c8d;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .mic-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #e74c3c;
  }
  .mic-dot.pulse {
    animation: pulse 0.8s infinite;
  }
  .btn-mic {
    background: #8e44ad;
    color: #fff;
  }
  .btn-mic:hover { background: #7d3c98; }
  .btn-mic.listening-active {
    background: #c0392b;
    animation: pulse 1s infinite;
  }
  .btn-mic:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn-mic-unsupported {
    background: #95a5a6;
    color: #fff;
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ========== 按钮 ========== */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 28px;
    border: none;
    border-radius: 60px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    user-select: none;
  }
  .btn:active { transform: scale(0.95); }
  .btn-pass    { background: #27ae60; color: #fff; }
  .btn-pass:hover { background: #229954; }
  .btn-fail    { background: #e74c3c; color: #fff; }
  .btn-fail:hover { background: #cb4335; }
  .btn-skip    { background: #95a5a6; color: #fff; }
  .btn-skip:hover { background: #7f8c8d; }
  .btn-hint    { background: #f39c12; color: #fff; }
  .btn-hint:hover { background: #d68910; }
  .btn-reset   { background: #ecf0f1; color: #2c3e50; }
  .btn-reset:hover { background: #d5dbdb; }
  .btn-restart { background: #8e44ad; color: #fff; }
  .btn-restart:hover { background: #7d3c98; }
  .btn-sm      { padding: 8px 18px; font-size: 14px; }
  .btn-danger  { background: #e74c3c; color: #fff; }
  .btn-danger:hover { background: #cb4335; }

  /* ========== 结算页面 ========== */
  .result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .result-screen.show {
    display: flex;
  }
  .result-emoji { font-size: 64px; }
  .result-title { font-size: 26px; font-weight: 700; color: #3e2723; }
  .result-detail { font-size: 15px; color: #5d4037; line-height: 1.8; text-align: center; }
  .result-detail .green { color: #27ae60; font-weight: 700; }
  .result-detail .red { color: #e74c3c; font-weight: 700; }
  .result-detail .gray { color: #95a5a6; }

  /* ========== 错字本 ========== */
  .wrong-list { margin-top: 8px; width: 100%; }
  .wrong-list summary {
    cursor: pointer;
    font-size: 15px;
    color: #e74c3c;
    font-weight: 600;
  }
  .wrong-words {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    justify-content: center;
  }
  .wrong-word-tag {
    background: #fdedec;
    color: #c0392b;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 600;
  }

  /* ========== 复习模式 ========== */
  .review-hint {
    background: #fef9e7;
    border: 2px solid #f9e79f;
    border-radius: 16px;
    padding: 12px 16px;
    margin-bottom: 12px;
    text-align: center;
    font-size: 14px;
    color: #7d6608;
  }

  /* ========== 模式开关 ========== */
  .mode-toggle {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .mode-toggle .btn {
    font-size: 14px;
    padding: 8px 20px;
    background: #eaecee;
    color: #566573;
    border: 2px solid transparent;
  }
  .mode-toggle .btn.active {
    background: #f5cba7;
    color: #6e2c00;
    border-color: #e67e22;
    box-shadow: 0 0 0 2px #f5cba7;
  }

  /* ========== 继续/重置遮罩 ========== */
  .resume-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,254,247,0.92);
    border-radius: 32px;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 30px;
    text-align: center;
  }
  .resume-overlay.show { display: flex; }
  .resume-overlay .icon { font-size: 56px; }
  .resume-overlay h2 { font-size: 22px; color: #3e2723; }
  .resume-overlay p { font-size: 15px; color: #5d4037; line-height: 1.6; }
  .resume-overlay .progress-mini {
    background: #fdf2e9;
    border-radius: 40px;
    height: 10px;
    width: 240px;
    overflow: hidden;
    margin: 4px 0 8px;
  }
  .resume-overlay .progress-mini-fill {
    height: 100%;
    background: linear-gradient(90deg, #f39c12, #d35400);
    border-radius: 40px;
    transition: width 0.5s;
  }

  /* ========== 保存提示 ========== */
  .save-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #3e2723;
    color: #fff;
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
  }
  .save-toast.show { opacity: 1; }

  /* ========== 响应式 ========== */
  @media (max-width: 500px) {
    .container { padding: 20px 14px; }
    .main-char { font-size: 80px; }
    .pinyin { font-size: 22px; }
    .btn { font-size: 14px; padding: 10px 18px; }
    .header h1 { font-size: 18px; }
    .resume-overlay .progress-mini { width: 180px; }
  }


/* ========== Hanzi Writer 双层显示 + 田字格 ========== */
#hz-wrapper {
  position: relative;
  width: 220px;
  height: 220px;
  margin: 0 auto 12px;
}
#hz-static {
  transition: opacity 0.15s;
}
#hz-static.hidden {
  opacity: 0;
}
.stroke-controls {
  display: flex;
  gap: 8px;
  margin-top: 4px;
  justify-content: center;
  align-items: center;
}
.stroke-controls .btn-stroke {
  padding: 6px 14px;
  font-size: 13px;
  border-radius: 20px;
  border: 1.5px solid #d35400;
  background: #fff;
  color: #d35400;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.15s;
}
.stroke-controls .btn-stroke:hover {
  background: #d35400;
  color: #fff;
}
.stroke-controls .btn-stroke.active {
  background: #d35400;
  color: #fff;
}
.stroke-controls .btn-stroke:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.stroke-info {
  font-size: 12px;
  color: #a04000;
  font-weight: 600;
}

</style>
</head>
<body>
<div class="container" id="app" style="position:relative">

  <!-- ====== Header ====== -->
  <div class="header">
    <span class="shrimp">🦐</span>
    <h1>📖 生字闯关</h1>
    <div class="subtitle">一年级下册 · 小钳仙陪你练字</div>
  </div>

  <!-- ====== 模式 ====== -->
  <div class="mode-toggle">
    <button class="btn active" data-mode="normal" onclick="setMode('normal')">🏁 闯关模式</button>
    <button class="btn" data-mode="review" onclick="setMode('review')">🔄 复习错字</button>
  </div>

  <!-- ====== 进度 ====== -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-text" id="progressText">0 / 250</div>
  </div>

  <!-- ====== 统计 ====== -->
  <div class="stats">
    <span class="stat-pass">✅ 通过 <span class="num" id="passCount">0</span></span>
    <span class="stat-fail">❌ 不会 <span class="num" id="failCount">0</span></span>
    <span class="stat-left">📌 剩余 <span class="num" id="leftCount">250</span></span>
  </div>

  <!-- ====== 卡片 ====== -->
  <div class="card-zone" id="cardZone">
    <div id="hz-wrapper" style="position:relative;width:220px;height:220px;margin:0 auto 12px;">
      <!-- 田字格 SVG 背景（始终可见） -->
      <svg id="hz-grid" viewBox="0 0 220 220" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;">
        <rect x="1" y="1" width="218" height="218" fill="#fffef7" stroke="#e67e22" stroke-width="2" rx="3"/>
        <line x1="110" y1="0" x2="110" y2="220" stroke="#d35400" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.45"/>
        <line x1="0" y1="110" x2="220" y2="110" stroke="#d35400" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.45"/>
        <line x1="0" y1="0" x2="220" y2="220" stroke="#e8a87c" stroke-width="0.5" stroke-dasharray="4,5" opacity="0.3"/>
        <line x1="220" y1="0" x2="0" y2="220" stroke="#e8a87c" stroke-width="0.5" stroke-dasharray="4,5" opacity="0.3"/>
      </svg>
      <!-- HanziWriter 动画层（只用于笔画动画） -->
      <div id="hz-container" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;"></div>
      <!-- 静态楷体字（透明，叠加在田字格上） -->
      <div id="hz-static" style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'GameKaiTi','LXGW WenKai','Kaiti SC','STKaiti','KaiTi','楷体',serif;font-size:110px;font-weight:400;color:#2c1810;z-index:3;pointer-events:none;transition:opacity 0.15s;"></div>
    </div>
    <div class="stroke-controls">
      <button class="btn-stroke" id="btnStroke" onclick="toggleStrokeAnim()">✍️ 笔画顺序</button>
      <span class="stroke-info" id="strokeInfo"></span>
    </div>
    <div class="pinyin" id="pinyin"></div>
    <div class="words" id="words"></div>
    <div class="listen-status result-wait" id="listenStatus">🎤 点击麦克风按钮跟读</div>
    <div class="btn-row" id="btnRow">
      <button class="btn btn-pass" onclick="markPass()">✅ 认识</button>
      <button class="btn btn-fail" onclick="markFail()">❌ 不会</button>
      <button class="btn btn-mic btn-sm" id="micBtn" onclick="toggleListen()">🎤 跟读</button>
      <button class="btn btn-hint btn-sm" onclick="showHint()">💡 提示</button>
    </div>
  </div>

  <!-- ====== 结算页 ====== -->
  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">全部通关！</div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="wrong-list" id="wrongListWrap" style="display:none">
      <details>
        <summary>📋 查看没记住的字</summary>
        <div class="wrong-words" id="wrongWords"></div>
      </details>
    </div>
    <div class="btn-row">
      <button class="btn btn-restart" onclick="restartAll()">🔄 重新闯关</button>
      <button class="btn btn-pass" onclick="reviewWrong()">📖 只复习错字</button>
    </div>
  </div>

  <!-- ====== 保存提示 ====== -->
  <div class="save-toast" id="saveToast">💾 已自动保存</div>

</div>

<script>
// ============================================================
//  生字闯关 v2 — 小钳仙
//  修复: 语法错误、语音识别事件绑定、递归栈溢出
//  新增: 键盘快捷键、流程优化
// ============================================================
//  生字库  —  人教版一年级下册（约 250 字）
// ============================================================
const ALL_CHARS = [

// ============================================================
//  Hanzi Writer — 笔画顺序动画（静态显示 + 动画叠加）
// ============================================================
let hzWriter = null;
let hzAnimating = false;
let hzDataReady = false;

function initWriter(charStr) {
  // ★ 静态大字始终显示
  var staticEl = document.getElementById('hz-static');
  if (staticEl) {
    staticEl.textContent = charStr;
    staticEl.classList.remove('hidden');
  }

  // 重置动画状态
  hzAnimating = false;
  hzDataReady = false;
  var btn = document.getElementById('btnStroke');
  btn.textContent = '✍️ 笔画顺序';
  btn.classList.remove('active');
  btn.disabled = true;
  document.getElementById('strokeInfo').textContent = '';

  // 清理旧 HanziWriter 实例和 DOM 残留
  if (hzWriter) { hzWriter = null; }
  var hzCont = document.getElementById('hz-container');
  if (hzCont) { hzCont.innerHTML = ''; }

  // 库未加载 → 按钮不可用
  if (typeof HanziWriter === 'undefined') {
    btn.textContent = '⚠️ 正在加载...';
    return;
  }

  // 创建 HanziWriter（在静态层下方加载笔画数据）
  try {
    hzWriter = HanziWriter.create('hz-container', charStr, {
      width: 220,
      height: 220,
      padding: 5,
      strokeAnimationSpeed: 1.2,
      delayBetweenStrokes: 600,
      strokeColor: '#333',
      radicalColor: '#d35400',
      outlineColor: '#ddd',
      showCharacter: false,
      showOutline: false,
      charDataLoader: function(ch, onComplete) {
        fetch('https://fastly.jsdelivr.net/npm/hanzi-writer-data@2.0/' + encodeURIComponent(ch) + '.json')
          .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
          })
          .then(function(data) { onComplete(data); })
          .catch(function(err) {
            console.warn('HW: no stroke data for ' + ch, err);
            onComplete(null);
          });
      },
      onLoadCharDataSuccess: function() {
        hzDataReady = true;
        document.getElementById('btnStroke').disabled = false;
      },
      onLoadCharDataError: function(ch) {
        console.warn('HW: data error for ' + ch);
        document.getElementById('btnStroke').disabled = true;
        document.getElementById('btnStroke').textContent = '🚫 无笔画数据';
      }
    });
  } catch(e) {
    console.warn('HW create error:', e);
    btn.disabled = true;
  }
}

function toggleStrokeAnim() {
  if (!hzWriter || !hzDataReady) return;

  if (hzAnimating) {
    // 停止
    try { hzWriter.stopAnimation(); } catch(e) {}
    hzAnimating = false;
    document.getElementById('btnStroke').textContent = '✍️ 笔画顺序';
    document.getElementById('btnStroke').classList.remove('active');
    document.getElementById('hz-static').classList.remove('hidden');
    return;
  }

  // 开始动画
  hzAnimating = true;
  document.getElementById('btnStroke').textContent = '⏸ 停止';
  document.getElementById('btnStroke').classList.add('active');
  // 动画期间隐藏静态字，看笔画动画
  document.getElementById('hz-static').classList.add('hidden');

  hzWriter.animateCharacter({
    onComplete: function() {
      var strokes = hzWriter.getStrokeCount ? hzWriter.getStrokeCount() : '';
      document.getElementById('strokeInfo').textContent = strokes ? strokes + '画' : '';
      hzAnimating = false;
      document.getElementById('btnStroke').textContent = '🔄 重播';
      document.getElementById('btnStroke').classList.remove('active');
      // 延迟后隐藏笔画，恢复静态字
      setTimeout(function() {
        try { hzWriter.hideCharacter(); } catch(e) {}
        document.getElementById('hz-static').classList.remove('hidden');
      }, 1500);
    }
  });
}

// ============================================================
//  状态
// ============================================================
const STORAGE_KEY = 'shengzi_game_v1';

let state = {
  mode: 'normal',           // normal | review
  chars: [],                // 当前学习队列
  passSet: new Set(),       // 认识的字
  failSet: new Set(),       // 不会的字
  currentIndex: 0,
  shuffled: false,
  hintVisible: false,
  isResult: false,
  // 需要序列化到 localStorage 的额外数据
  shuffledOrder: [],        // 打乱后的字符索引顺序
  autoListen: false,        // 自动跟读模式
  _continueLearning: false,  // 全部判完后继续练不会的字
};

// ============================================================
//  自动保存
// ============================================================
function saveState() {
  try {
    const save = {
      version: 1,
      timestamp: Date.now(),
      passList: Array.from(state.passSet),
      failList: Array.from(state.failSet),
      shuffledOrder: state.shuffledOrder,
      currentIndex: state.currentIndex,
      mode: state.mode,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(save));
  } catch (e) {
    // localStorage 不可用时静默忽略
  }
}

function showSaveToast() {
  const el = document.getElementById('saveToast');
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 1200);
}

function autoSave() {
  saveState();
  showSaveToast();
}

function loadSavedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const save = JSON.parse(raw);
    if (!save || !save.version) return null;
    return save;
  } catch (e) {
    return null;
  }
}

function clearSavedState() {
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (e) {}
}

// ============================================================
//  函数
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function initGame(fromSaved) {
  if (!fromSaved) {
    state.passSet = new Set();
    state.failSet = new Set();
    state.hintVisible = false;
    state.isResult = false;
    state.mode = 'normal';

    // 使用选中的字
    state.chars = shuffle([...ALL_CHARS]);
    state.shuffledOrder = state.chars.map(c => ALL_CHARS.indexOf(c));
    state.shuffled = true;
    state.currentIndex = 0;
    state.autoListen = false;
    state._continueLearning = false;

    clearSavedState();
  }
  stopListen();

  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('cardZone').style.display = 'flex';
  var ro = document.getElementById('resumeOverlay'); if (ro) ro.classList.remove('show');
  render();
}

// ============================================================
function render() {
  const { chars, passSet, failSet, isResult } = state;

  // 统计（用当前学习队列的总数）
  document.getElementById('passCount').textContent = passSet.size;
  document.getElementById('failCount').textContent = failSet.size;
  var leftTotal = state.chars.length;
  document.getElementById('leftCount').textContent = leftTotal - passSet.size - failSet.size;

  // 进度条
  var done = passSet.size + failSet.size;
  var pct = leftTotal > 0 ? (done / leftTotal) * 100 : 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${leftTotal}`;

  // 如果已经全部判完 → 结算
  if (isResult || state.currentIndex >= chars.length) {
    showResult();
    return;
  }

  // 跳过已判定的字（while 循环替代递归，避免栈溢出）
  var skipFailInNormal = state.mode === 'review' || state._continueLearning;
  while (state.currentIndex < chars.length) {
    var item = chars[state.currentIndex];
    if (skipFailInNormal ? passSet.has(item.char) : (passSet.has(item.char) || failSet.has(item.char))) {
      state.currentIndex++;
    } else {
      break;
    }
  }
  if (state.currentIndex >= chars.length) {
    showResult();
    return;
  }

  var cur = chars[state.currentIndex];

  // 显示字（田字格）
  initWriter(cur.char);
  document.getElementById('pinyin').textContent = '';
  document.getElementById('words').textContent = '';
  state.hintVisible = false;

  // 重置跟读状态
  if (!state.autoListen) {
    setListenStatus('🎤 点跟读按钮开始', 'result-wait');
  }
  updateMicBtn(true, false);

  // 按钮
  document.getElementById('btnRow').innerHTML = [
    '<button class="btn btn-pass" onclick="markPass()">✅ 认识</button>',
    '<button class="btn btn-fail" onclick="markFail()">❌ 不会</button>',
    '<button class="btn btn-sm" style="background:#2980b9;color:#fff;" onclick="var c=state.chars[state.currentIndex];if(c)speakChar(c.char,c.pinyin);">🔊 朗读</button>',
    '<button class="btn btn-mic btn-sm" id="micBtn" onclick="toggleListen()">' + (state.autoListen ? '🔁 自动跟读中' : '🎤 跟读') + '</button>',
    '<button class="btn btn-hint btn-sm" onclick="showHint()">💡 提示</button>'
  ].join('');

  document.getElementById('cardZone').style.display = 'flex';
  document.getElementById('resultScreen').classList.remove('show');
}

function markPass() {
  stopListen();
  if (state.isResult) return;
  const item = state.chars[state.currentIndex];
  if (!item) return;
  state.passSet.add(item.char);
  state.failSet.delete(item.char);
  state.currentIndex++;
  autoSave();
  render();
}

function markFail() {
  stopListen();
  if (state.isResult) return;
  const item = state.chars[state.currentIndex];
  if (!item) return;
  state.failSet.add(item.char);
  state.currentIndex++;
  autoSave();
  render();
}

function showHint() {
  if (state.isResult) return;
  const item = state.chars[state.currentIndex];
  if (!item) return;
  state.hintVisible = true;
  document.getElementById('pinyin').textContent = item.pinyin;
  document.getElementById('words').textContent = '💡 ' + item.word;
  // 读出这个字
  speakChar(item.char, item.pinyin);
}

function showResult() {
  state.isResult = true;
  document.getElementById('cardZone').style.display = 'none';

  var pass = state.passSet.size;
  var fail = state.failSet.size;
  var studied = pass + fail;
  var pct = studied > 0 ? Math.round((pass / studied) * 100) : 0;

  let emoji, title;
  if (pct >= 90) { emoji = '🏆'; title = '太棒啦！生字小达人！'; }
  else if (pct >= 70) { emoji = '🌟'; title = '不错哦！继续加油！'; }
  else if (pct >= 50) { emoji = '💪'; title = '还可以，要多练练！'; }
  else { emoji = '😅'; title = '还要加油哦！🦐 小钳仙陪你练！'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultDetail').innerHTML =
    `共 <span class="green">${pass}</span> 个认识，
     <span class="red">${fail}</span> 个不会，
     正确率 <span class="green">${pct}%</span>`;

  // 错字本
  const wrongArr = Array.from(state.failSet);
  if (wrongArr.length > 0) {
    document.getElementById('wrongListWrap').style.display = 'block';
    document.getElementById('wrongWords').innerHTML =
      wrongArr.map(c => `<span class="wrong-word-tag">${c}</span>`).join('');
  } else {
    document.getElementById('wrongListWrap').style.display = 'none';
  }

  const screen = document.getElementById('resultScreen');
  screen.classList.add('show');

  // 关闭麦克风和自动跟读
  stopListen();
  state.autoListen = false;
  state._continueLearning = false;

  autoSave();
}

function setMode(mode) {
  stopListen();
  state.autoListen = false;
  state._continueLearning = false;
  state.mode = mode;
  state.hintVisible = false;
  state.isResult = false;
  state.currentIndex = 0;

  document.querySelectorAll('.mode-toggle .btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.mode-toggle .btn[data-mode="' + mode + '"]').classList.add('active');

  if (mode === 'review') {
    // 复习模式：只看错字
    var wrongArr = Array.from(state.failSet);
    if (wrongArr.length === 0) {
      alert('🎉 没有错字，你太棒了！');
      setMode('normal');
      return;
    }
    var wrongChars = new Set(wrongArr);
    state.chars = ALL_CHARS.filter(function(c) { return wrongChars.has(c.char); });
    // 复习模式打乱
    state.chars = shuffle(state.chars);
    state.shuffledOrder = state.chars.map(function(c) { return ALL_CHARS.indexOf(c); });
  } else {
    // 闯关模式：全新打乱完整队列
    state.chars = shuffle([].concat(ALL_CHARS));
    state.shuffledOrder = state.chars.map(function(c) { return ALL_CHARS.indexOf(c); });
  }

  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('cardZone').style.display = 'flex';
  autoSave();
  render();
}

function restartAll() {
  if (!confirm('确定要重新开始吗？之前的成绩会清零。')) return;
  clearSavedState();
  initGame(false);
}

function reviewWrong() {
  if (state.failSet.size === 0) {
    alert('🎉 没有错字！');
    return;
  }
  setMode('review');
}

// ============================================================

// ============================================================
// ============================================================
//  语音跟读（Web Speech API）
// ============================================================
var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var IS_SPEECH_SUPPORTED = !!SpeechRecognition;
// 语音 API 需要安全上下文：HTTPS 或 localhost
var IS_SECURE_CTX = window.isSecureContext || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
var IS_SPEECH_USABLE = IS_SPEECH_SUPPORTED && IS_SECURE_CTX;
var IS_TTS_SUPPORTED = !!window.speechSynthesis;
var recognition = null;
var listenAttempts = 0;
var MAX_LISTEN_ATTEMPTS = 3;
var ttsVoicesReady = false;

// 预加载 TTS 声音列表
if (IS_TTS_SUPPORTED) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = function() { ttsVoicesReady = true; };
}

// ============================================================
//  TTS 朗读（机器读字）
// ============================================================
var _ttsUtterance = null;

function speakChar(charStr, pinyin) {
  if (!IS_TTS_SUPPORTED) {
    console.log('[TTS] speechSynthesis not supported');
    return;
  }

  // 停止之前的朗读
  try { speechSynthesis.cancel(); } catch(e) {}

  // 等一帧确保 cancel 生效
  setTimeout(function() {
    try {
      var u = new SpeechSynthesisUtterance(charStr);
      u.lang = 'zh-CN';
      u.rate = 0.65;
      u.pitch = 1.05;
      u.volume = 1.0;

      // 尝试选中文声音
      var voices = speechSynthesis.getVoices();
      for (var i = 0; i < voices.length; i++) {
        if (voices[i].lang.indexOf('zh') === 0 || voices[i].lang.indexOf('yue') === 0) {
          u.voice = voices[i];
          break;
        }
      }

      // 调试
      u.onstart = function() { console.log('[TTS] started:', charStr); };
      u.onend = function() { console.log('[TTS] ended:', charStr); };
      u.onerror = function(e) { console.log('[TTS] error:', e.error, charStr); };

      _ttsUtterance = u;
      speechSynthesis.speak(u);
    } catch(e) {
      console.log('[TTS] failed:', e);
    }
  }, 50);
}

function setListenStatus(text, className) {
  var el = document.getElementById('listenStatus');
  if (el) {
    el.textContent = text;
    el.className = 'listen-status' + (className ? ' ' + className : '');
  }
}

function updateMicBtn(enabled, listening) {
  var btn = document.getElementById('micBtn');
  if (!IS_SPEECH_SUPPORTED) {
    if (btn) {
      btn.className = 'btn btn-mic-unsupported btn-sm';
      btn.textContent = '🎤 不支持';
    }
    setListenStatus('⚠️ 语音识别仅支持 Chrome / Edge', 'result-fail');
    return;
  }
  if (!IS_SECURE_CTX) {
    if (btn) {
      btn.className = 'btn btn-mic-unsupported btn-sm';
      btn.textContent = '🔒 不安全';
    }
    setListenStatus('⚠️ 语音识别需要 HTTPS 或 localhost 访问', 'result-fail');
    return;
  }
  if (!btn) return;
  btn.disabled = false;
  if (listening) {
    btn.classList.add('listening-active');
    btn.textContent = '🔴 聆听中...';
  } else if (state.autoListen) {
    btn.classList.remove('listening-active');
    btn.textContent = '🔁 自动跟读中';
  } else {
    btn.classList.remove('listening-active');
    btn.textContent = '🎤 跟读';
  }
}

function stopListen() {
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
  }
  clearTimeout(state._autoListenTimer);
  state._autoListenTimer = null;
}

// Start listening for the current character.
function startListen() {
  if (!IS_SPEECH_USABLE) {
    setListenStatus('⚠️ 语音识别不可用', 'result-fail');
    return;
  }
  if (state.isResult) return;
  var idx = state.currentIndex;
  var item = state.chars[idx];
  if (!item) return;

  stopListen();
  listenAttempts = 0;
  var resultReceived = false;

  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;

  recognition.onstart = function() {
    setListenStatus('🎤 正在听...', 'listening');
    updateMicBtn(true, true);
  };

  recognition.onspeechstart = function() {
    setListenStatus('🔊 检测到声音！', 'listening');
  };

  recognition.onspeechend = function() {
    setListenStatus('⏳ 识别中...', 'result-wait');
  };

  recognition.onresult = function(event) {
    var text = '';
    var isFinal = false;
    for (var i = event.resultIndex; i < event.results.length; i++) {
      text += event.results[i][0].transcript;
      if (event.results[i].isFinal) isFinal = true;
    }
    if (text) {
      // 显示识别到的文字，方便诊断
      setListenStatus('👂 听到: 「' + text + '」', isFinal ? 'result-pass' : 'listening');
    }
    if (isFinal) {
      resultReceived = true;
      processResult(idx, text, null);
    }
  };

  recognition.onerror = function(event) {
    console.log('[HW] Speech error:', event.error);
    if (event.error === 'no-speech') {
      setListenStatus('🔇 没听到声音', 'result-fail');
      processResult(idx, null, 'no-speech');
      return;
    }
    if (event.error === 'aborted') return;
    if (event.error === 'not-allowed') {
      setListenStatus('🚫 麦克风权限被拒绝！请检查浏览器设置 → 允许麦克风', 'result-fail');
      updateMicBtn(true, false);
      state.autoListen = false;
      return;
    }
    if (event.error === 'audio-capture') {
      setListenStatus('🔌 找不到麦克风设备', 'result-fail');
      updateMicBtn(true, false);
      state.autoListen = false;
      return;
    }
    if (event.error === 'network') {
      setListenStatus('🌐 语音识别需要网络连接', 'result-fail');
      updateMicBtn(true, false);
      state.autoListen = false;
      return;
    }
    processResult(idx, null, event.error);
  };

  recognition.onend = function() {
    // 如果 onresult 从未触发 → 完全没检测到语音
    if (!resultReceived && state.autoListen && !state.isResult && state.currentIndex === idx) {
      if (listenAttempts === 0) {
        processResult(idx, null, 'no-speech');
        return;
      }
    }
    // 自动模式下重试
    if (state.autoListen && !state.isResult && state.currentIndex === idx && listenAttempts > 0 && listenAttempts < MAX_LISTEN_ATTEMPTS) {
      clearTimeout(state._autoListenTimer);
      state._autoListenTimer = setTimeout(function() { startListen(); }, 1200);
    }
  };

  try {
    recognition.start();
    setListenStatus('🎤 聆听中，请读字...', 'listening');
    updateMicBtn(true, true);
  } catch (e) {
    console.log('[HW] start error:', e);
    state.autoListen = false;
    updateMicBtn(true, false);
    setListenStatus('⚠️ 麦克风启动失败: ' + (e.message || e), 'result-fail');
    recognition = null;
  }
}

function processResult(idx, text, failReason) {
  // Check if we're still on the same character
  if (state.isResult) return;
  if (state.currentIndex !== idx) return; // user already moved on

  if (text) {
    var clean = text.trim().replace(/[\u3000\u3001\u3002\uFF0C\uFF01\uFF1F\uFF1B\uFF1A\u201C\u201D\u2018\u2019\s\uFEFF\u200B]/g, '');
    if (clean.indexOf(state.chars[idx].char) !== -1) {
      // 读对了！
      var matchChar = state.chars[idx].char;
      setListenStatus('✅ 读对了！（' + matchChar + '）', 'result-pass');
      state.passSet.add(matchChar);
      state.failSet.delete(matchChar);
      state.currentIndex++;
      autoSave();
      scheduleNext(500);
      return;
    }
  }

  // 没读对或无语音
  listenAttempts++;

  // 还剩1次机会时，自动显示拼音提示
  if (listenAttempts === MAX_LISTEN_ATTEMPTS - 1) {
    var hintItem = state.chars[idx];
    document.getElementById('pinyin').textContent = '🔊 ' + hintItem.pinyin;
    document.getElementById('words').textContent = '💡 ' + hintItem.word;
  }

  if (listenAttempts >= MAX_LISTEN_ATTEMPTS) {
    var theChar = state.chars[idx].char;
    var heard = text ? '「' + text.trim() + '」' : '';
    setListenStatus('❌ 标记为不认识' + (heard ? heard : ''), 'result-fail');
    state.failSet.add(theChar);
    state.passSet.delete(theChar);
    state.currentIndex++;
    autoSave();
    scheduleNext(800);
  } else {
    var n = MAX_LISTEN_ATTEMPTS - listenAttempts;
    if (text) {
      setListenStatus('🤔 再试一次（还剩' + n + '次）', 'result-fail');
    } else {
      setListenStatus('🔇 未听清，再试一次（还剩' + n + '次）', 'listening');
    }
    if (state.autoListen) {
      clearTimeout(state._autoListenTimer);
      state._autoListenTimer = setTimeout(function() { startListen(); }, 1200);
    } else {
      updateMicBtn(true, false);
    }
  }
}

function scheduleNext(delay) {
  if (!state.autoListen) {
    updateMicBtn(true, false);
    // Re-render after manual actions
    renderAfterMark();
    return;
  }
  // Auto-listen: wait, then render the next char and auto-start mic
  clearTimeout(state._autoListenTimer);
  state._autoListenTimer = setTimeout(function() {
    if (state.currentIndex >= state.chars.length) {
      showResult();
      return;
    }
    renderNextAndListen();
  }, delay + 200);
}

function renderNextAndListen() {
  var chars = state.chars;
  var idx = state.currentIndex;
  if (idx >= chars.length) {
    showResult();
    return;
  }
  // Skip already-marked chars (review mode: only skip passed ones)
  var skipFail = state.mode === 'review' || state._continueLearning;
  while (idx < chars.length && (skipFail ? state.passSet.has(chars[idx].char) : (state.passSet.has(chars[idx].char) || state.failSet.has(chars[idx].char)))) {
    idx++;
    state.currentIndex = idx;
  }
  if (idx >= chars.length) {
    showResult();
    return;
  }
  // Render the char
  renderFresh(idx);
  // Auto-start mic after a brief pause (only if still in autoListen mode)
  clearTimeout(state._autoListenTimer);
  if (state.autoListen) {
    state._autoListenTimer = setTimeout(function() {
      startListen();
    }, 2000);
  }
}

function renderFresh(idx) {
  var chars = state.chars;
  var passCount = state.passSet.size;
  var failCount = state.failSet.size;
  var total = state.chars.length || ALL_CHARS.length;

  document.getElementById('passCount').textContent = passCount;
  document.getElementById('failCount').textContent = failCount;
  document.getElementById('leftCount').textContent = total - passCount - failCount;

  var done = passCount + failCount;
  document.getElementById('progressBar').style.width = (total > 0 ? (done / total * 100) : 0) + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total;

  var item = chars[idx];
  initWriter(item.char);
  document.getElementById('pinyin').textContent = '';
  document.getElementById('words').textContent = '';
  state.hintVisible = false;

  setListenStatus(state.autoListen ? '\u{1F3A4} \u5373\u5C06\u8046\u542C...' : '\u{1F3A4} \u70B9\u8DDF\u8BFB\u5F00\u59CB', 'result-wait');
  updateMicBtn(true, false);

  document.getElementById('btnRow').innerHTML = [
    '<button class="btn btn-pass" onclick="markPass()">\u2705 \u8BA4\u8BC6</button>',
    '<button class="btn btn-fail" onclick="markFail()">\u274C \u4E0D\u4F1A</button>',
    '<button class="btn btn-sm" style="background:#2980b9;color:#fff;" onclick="var c=state.chars[state.currentIndex];if(c)speakChar(c.char,c.pinyin);">\u{1F50A} \u6717\u8BFB</button>',
    '<button class="btn btn-mic btn-sm" id="micBtn" onclick="toggleListen()">' + (state.autoListen ? '\u{1F501} \u81EA\u52A8\u8DDF\u8BFB\u4E2D' : '\u{1F3A4} \u8DDF\u8BFB') + '</button>',
    '<button class="btn btn-hint btn-sm" onclick="showHint()">\u{1F4A1} \u63D0\u793A</button>'
  ].join('');

  document.getElementById('cardZone').style.display = 'flex';
  document.getElementById('resultScreen').classList.remove('show');
}

function renderAfterMark() {
  var chars = state.chars;
  var idx = state.currentIndex;

  // Skip already-marked chars (review mode: only skip passed ones)
  var skipFail = state.mode === 'review' || state._continueLearning;
  while (idx < chars.length && (skipFail ? state.passSet.has(chars[idx].char) : (state.passSet.has(chars[idx].char) || state.failSet.has(chars[idx].char)))) {
    idx++;
    state.currentIndex = idx;
  }

  if (idx >= chars.length) {
    showResult();
    return;
  }
  renderFresh(idx);
}

function toggleListen() {
  if (!IS_SPEECH_USABLE) {
    if (!IS_SPEECH_SUPPORTED) {
      setListenStatus('⚠️ 语音识别需要 Chrome 或 Edge 浏览器', 'result-fail');
    } else if (!IS_SECURE_CTX) {
      setListenStatus('⚠️ 需要用 localhost 或 HTTPS 访问才能使用语音', 'result-fail');
    }
    setTimeout(function() { setListenStatus('🔊 点「朗读」按钮可以听发音', 'result-wait'); }, 2500);
    return;
  }

  // Always stop any active recognition first
  stopListen();

  if (state.autoListen) {
    // Turn OFF
    state.autoListen = false;
    updateMicBtn(true, false);
    setListenStatus('🎤 已停止跟读', 'result-wait');
  } else {
    // Turn ON
    state.autoListen = true;
    updateMicBtn(true, false);
    setTimeout(startListen, 200);
  }
}

function resumeGame() {
  const saved = loadSavedState();
  if (!saved) {
    initGame(false);
    return;
  }
  state.passSet = new Set(saved.passList || []);
  state.failSet = new Set(saved.failList || []);
  state.mode = saved.mode || 'normal';
  state.hintVisible = false;
  state.isResult = false;
  state.autoListen = false;

  // ★ 恢复保存的字序，不打乱
  if (saved.shuffledOrder && saved.shuffledOrder.length > 0) {
    state.chars = saved.shuffledOrder.map(function(i) { return ALL_CHARS[i]; }).filter(Boolean);
    state.shuffledOrder = saved.shuffledOrder;
  } else {
    state.chars = shuffle([].concat(ALL_CHARS));
    state.shuffledOrder = state.chars.map(function(c) { return ALL_CHARS.indexOf(c); });
  }
  state.currentIndex = saved.currentIndex || 0;

  document.querySelectorAll('.mode-toggle .btn').forEach(function(b) { b.classList.remove('active'); });
  var modeBtn = document.querySelector('.mode-toggle .btn[data-mode="' + state.mode + '"]');
  if (modeBtn) modeBtn.classList.add('active');
  document.getElementById('cardZone').style.display = 'flex';
  render();
}

function clearAndStart() {
  if (!confirm('确定要重新开始吗？上次的成绩会被清除。')) return;
  clearSavedState();
  initGame(false);
}

// ============================================================
function checkSavedData() {
  const saved = loadSavedState();
  if (saved) {
    // 恢复进度直接继续
    resumeGame();
    return;
  }
  initGame(false);
}

// ============================================================
//  启动
// ============================================================
// TTS 预热（某些浏览器首次 speak 会静默）
if (IS_TTS_SUPPORTED) {
  var _warm = new SpeechSynthesisUtterance('');
  _warm.volume = 0;
  _warm.rate = 2;
  speechSynthesis.speak(_warm);
}

checkSavedData();
