<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦐 小钳仙 · 生字闯关</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script>
// 检查 hanzi-writer 是否加载成功，失败则用文字回退
window.addEventListener('error', function(e) {
  if (e.target && e.target.src && e.target.src.indexOf('hanzi-writer') > -1) {
    window.HANZI_WRITER_FAILED = true;
  }
}, true);
</script>
<style>
  /* ========== 全局 ========== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #fef9e7 0%, #fdebd0 50%, #fce4cb 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  /* ========== 主容器 ========== */
  .container {
    width: 100%;
    max-width: 720px;
    background: #fffef7;
    border-radius: 32px;
    padding: 30px 24px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.12);
    position: relative;
    border: 3px solid #f5cba7;
  }
  /* 皮皮虾 header */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header .shrimp {
    font-size: 42px;
    display: block;
    margin-bottom: 2px;
  }
  .header h1 {
    font-size: 22px;
    color: #a04000;
    letter-spacing: 2px;
  }
  .header .subtitle {
    font-size: 13px;
    color: #b9770e;
    margin-top: 2px;
  }
  /* ========== 进度条 ========== */
  .progress-wrap {
    background: #fdf2e9;
    border-radius: 40px;
    height: 20px;
    position: relative;
    margin: 16px 0 24px;
    overflow: hidden;
    border: 2px solid #edbb99;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #f39c12, #e67e22, #d35400);
    border-radius: 40px;
    transition: width 0.5s ease;
  }
  .progress-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12px;
    font-weight: 700;
    color: #6e2c00;
    text-shadow: 0 0 6px #fff;
  }
  /* ========== 学习统计 ========== */
  .stats {
    display: flex;
    justify-content: space-around;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #6e2c00;
  }
  .stats span { display: flex; align-items: center; gap: 4px; }
  .stats .num { font-weight: 700; font-size: 16px; }
  .stat-pass .num { color: #27ae60; }
  .stat-fail .num { color: #e74c3c; }
  .stat-left .num { color: #b9770e; }
  /* ========== 卡片区 ========== */
  .card-zone {
    background: #fff;
    border-radius: 24px;
    padding: 28px 16px 20px;
    border: 2px dashed #f0c9a3;
    position: relative;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* —— 主字 —— */
  .main-char {
    font-size: 120px;
    font-weight: 700;
    color: #3e2723;
    line-height: 1.2;
    transition: transform 0.2s;
    user-select: none;
    cursor: default;
  }
  .main-char:hover { transform: scale(1.04); }

  /* —— 拼音 —— */
  .pinyin {
    font-size: 28px;
    color: #c0392b;
    margin-bottom: 4px;
    letter-spacing: 2px;
    min-height: 38px;
  }

  /* —— 组词 —— */
  .words {
    font-size: 16px;
    color: #7f8c8d;
    margin-bottom: 8px;
    min-height: 24px;
  }

  /* —— 跟读状态区 —— */
  .listen-status {
    font-size: 14px;
    min-height: 28px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }
  .listen-status.listening {
    color: #c0392b;
    font-weight: 600;
    animation: pulse 1s infinite;
  }
  .listen-status.result-pass {
    color: #27ae60;
    font-weight: 700;
  }
  .listen-status.result-fail {
    color: #e74c3c;
  }
  .listen-status.result-wait {
    color: #7f8c8d;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .mic-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #e74c3c;
  }
  .mic-dot.pulse {
    animation: pulse 0.8s infinite;
  }
  .btn-mic {
    background: #8e44ad;
    color: #fff;
  }
  .btn-mic:hover { background: #7d3c98; }
  .btn-mic.listening-active {
    background: #c0392b;
    animation: pulse 1s infinite;
  }
  .btn-mic:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn-mic-unsupported {
    background: #95a5a6;
    color: #fff;
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ========== 按钮 ========== */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 28px;
    border: none;
    border-radius: 60px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    user-select: none;
  }
  .btn:active { transform: scale(0.95); }
  .btn-pass    { background: #27ae60; color: #fff; }
  .btn-pass:hover { background: #229954; }
  .btn-fail    { background: #e74c3c; color: #fff; }
  .btn-fail:hover { background: #cb4335; }
  .btn-skip    { background: #95a5a6; color: #fff; }
  .btn-skip:hover { background: #7f8c8d; }
  .btn-hint    { background: #f39c12; color: #fff; }
  .btn-hint:hover { background: #d68910; }
  .btn-reset   { background: #ecf0f1; color: #2c3e50; }
  .btn-reset:hover { background: #d5dbdb; }
  .btn-restart { background: #8e44ad; color: #fff; }
  .btn-restart:hover { background: #7d3c98; }
  .btn-sm      { padding: 8px 18px; font-size: 14px; }
  .btn-danger  { background: #e74c3c; color: #fff; }
  .btn-danger:hover { background: #cb4335; }

  /* ========== 结算页面 ========== */
  .result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .result-screen.show {
    display: flex;
  }
  .result-emoji { font-size: 64px; }
  .result-title { font-size: 26px; font-weight: 700; color: #3e2723; }
  .result-detail { font-size: 15px; color: #5d4037; line-height: 1.8; text-align: center; }
  .result-detail .green { color: #27ae60; font-weight: 700; }
  .result-detail .red { color: #e74c3c; font-weight: 700; }
  .result-detail .gray { color: #95a5a6; }

  /* ========== 错字本 ========== */
  .wrong-list { margin-top: 8px; width: 100%; }
  .wrong-list summary {
    cursor: pointer;
    font-size: 15px;
    color: #e74c3c;
    font-weight: 600;
  }
  .wrong-words {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    justify-content: center;
  }
  .wrong-word-tag {
    background: #fdedec;
    color: #c0392b;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 600;
  }

  /* ========== 复习模式 ========== */
  .review-hint {
    background: #fef9e7;
    border: 2px solid #f9e79f;
    border-radius: 16px;
    padding: 12px 16px;
    margin-bottom: 12px;
    text-align: center;
    font-size: 14px;
    color: #7d6608;
  }

  /* ========== 模式开关 ========== */
  .mode-toggle {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .mode-toggle .btn {
    font-size: 14px;
    padding: 8px 20px;
    background: #eaecee;
    color: #566573;
    border: 2px solid transparent;
  }
  .mode-toggle .btn.active {
    background: #f5cba7;
    color: #6e2c00;
    border-color: #e67e22;
    box-shadow: 0 0 0 2px #f5cba7;
  }

  /* ========== 继续/重置遮罩 ========== */
  .resume-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,254,247,0.92);
    border-radius: 32px;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 30px;
    text-align: center;
  }
  .resume-overlay.show { display: flex; }
  .resume-overlay .icon { font-size: 56px; }
  .resume-overlay h2 { font-size: 22px; color: #3e2723; }
  .resume-overlay p { font-size: 15px; color: #5d4037; line-height: 1.6; }
  .resume-overlay .progress-mini {
    background: #fdf2e9;
    border-radius: 40px;
    height: 10px;
    width: 240px;
    overflow: hidden;
    margin: 4px 0 8px;
  }
  .resume-overlay .progress-mini-fill {
    height: 100%;
    background: linear-gradient(90deg, #f39c12, #d35400);
    border-radius: 40px;
    transition: width 0.5s;
  }

  /* ========== 保存提示 ========== */
  .save-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #3e2723;
    color: #fff;
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
  }
  .save-toast.show { opacity: 1; }

  /* ========== 响应式 ========== */
  @media (max-width: 500px) {
    .container { padding: 20px 14px; }
    .main-char { font-size: 80px; }
    .pinyin { font-size: 22px; }
    .btn { font-size: 14px; padding: 10px 18px; }
    .header h1 { font-size: 18px; }
    .resume-overlay .progress-mini { width: 180px; }
  }
/* ========== 田字格 ========== */
.char-canvas {
  width: 200px;
  height: 200px;
  margin: 0 auto;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}
.char-canvas svg {
  width: 100% !important;
  height: 100% !important;
}
.char-canvas-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 8px;
}

/* ========== 单元选择 ========== */
.unit-picker-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #fffef7;
  border-radius: 32px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  padding: 30px 24px;
  overflow-y: auto;
}
.unit-picker-overlay.hidden {
  display: none;
}
.unit-picker-overlay h2 {
  text-align: center;
  color: #a04000;
  font-size: 20px;
  margin-bottom: 4px;
}
.unit-picker-overlay .sub {
  text-align: center;
  color: #b9770e;
  font-size: 13px;
  margin-bottom: 16px;
}
.unit-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.unit-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: #fdf2e9;
  border-radius: 12px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.unit-item:hover {
  background: #fae5d3;
}
.unit-item.selected {
  border-color: #e67e22;
  background: #fef5e7;
}
.unit-item .checkbox {
  width: 22px; height: 22px;
  border-radius: 4px;
  border: 2px solid #b9770e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
  flex-shrink: 0;
  transition: all 0.2s;
}
.unit-item.selected .checkbox {
  background: #e67e22;
  border-color: #e67e22;
}
.unit-item .unit-name {
  flex: 1;
  font-weight: 600;
  color: #6e2c00;
  font-size: 15px;
}
.unit-item .unit-count {
  color: #b9770e;
  font-size: 13px;
}
.unit-item.select-all {
  background: #fef9e7;
  border-color: #f39c12;
  font-weight: 700;
}
.unit-item.select-all .unit-name {
  color: #d35400;
}
.btn-start {
  display: block;
  width: 100%;
  padding: 14px;
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, #e67e22, #d35400);
  color: #fff;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  margin-top: 12px;
  transition: opacity 0.2s;
}
.btn-start:hover { opacity: 0.9; }
.btn-start:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ========== 笔画动画按钮 ========== */
.stroke-btn-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 8px;
}
.stroke-btn-row .btn {
  font-size: 12px;
  padding: 4px 12px;
}

</style>
</head>
<body>
<div class="container" id="app" style="position:relative">

  <!-- ====== Header ====== -->
  <div class="header">
    <span class="shrimp">🦐</span>
    <h1>📖 生字闯关</h1>
    <div class="subtitle">一年级下册 · 小钳仙陪你练字</div>
  </div>

  <!-- ====== 模式 ====== -->
  <div class="mode-toggle">
    <button class="btn active" data-mode="normal" onclick="setMode('normal')">🏁 闯关模式</button>
    <button class="btn" data-mode="review" onclick="setMode('review')">🔄 复习错字</button>
  </div>

  <!-- ====== 进度 ====== -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-text" id="progressText">0 / 250</div>
  </div>

  <!-- ====== 统计 ====== -->
  <div class="stats">
    <span class="stat-pass">✅ 通过 <span class="num" id="passCount">0</span></span>
    <span class="stat-fail">❌ 不会 <span class="num" id="failCount">0</span></span>
    <span class="stat-left">📌 剩余 <span class="num" id="leftCount">250</span></span>
  </div>

  <!-- ====== 卡片 ====== -->
  <div class="card-zone" id="cardZone">
    <div class="char-canvas-wrap">
      <div class="char-canvas" id="charCanvas"></div>
      <div class="stroke-btn-row">
        <button class="btn btn-sm btn-pass" onclick="playStroke()" id="strokePlayBtn">✍️ 看笔画</button>
        <button class="btn btn-sm btn-fail" onclick="showFullChar()" id="strokeShowBtn">📖 看全字</button>
      </div>
    </div>
    <div class="pinyin" id="pinyin"></div>
    <div class="words" id="words"></div>
    <div class="listen-status result-wait" id="listenStatus">🎤 点击麦克风按钮跟读</div>
    <div class="btn-row" id="btnRow">
      <button class="btn btn-pass" onclick="markPass()">✅ 认识</button>
      <button class="btn btn-fail" onclick="markFail()">❌ 不会</button>
      <button class="btn btn-mic btn-sm" id="micBtn" onclick="toggleListen()">🎤 跟读</button>
      <button class="btn btn-hint btn-sm" onclick="showHint()">💡 提示</button>
    </div>
  </div>

  <!-- ====== 结算页 ====== -->
  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">全部通关！</div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="wrong-list" id="wrongListWrap" style="display:none">
      <details>
        <summary>📋 查看没记住的字</summary>
        <div class="wrong-words" id="wrongWords"></div>
      </details>
    </div>
    <div class="btn-row">
      <button class="btn btn-restart" onclick="restartAll()">🔄 重新闯关</button>
      <button class="btn btn-pass" onclick="reviewWrong()">📖 只复习错字</button>
    </div>
  </div>

  <!-- ====== 继续/重置遮罩 ====== -->
  <div class="resume-overlay" id="resumeOverlay">
    <div class="icon">🦐</div>
    <h2>📖 上次看到一半啦！</h2>
    <p id="resumeInfo">你已经认识了 <strong>0</strong> 个字，还有 <strong>0</strong> 个不会</p>
    <div class="progress-mini">
      <div class="progress-mini-fill" id="resumeProgressFill" style="width:0%"></div>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-pass" onclick="resumeGame()">▶️ 继续闯关</button>
      <button class="btn btn-danger btn-sm" onclick="clearAndStart()">🆕 重新开始</button>
      <button class="btn btn-sm" onclick="showUnitPicker()" style="background:#f0c9a3;color:#6e2c00">📚 选择其他单元</button>
    </div>
  </div>

  <!-- ====== 单元选择 ====== -->
  <div class="unit-picker-overlay" id="unitPicker">
    <h2>📚 选择学习单元</h2>
    <div class="sub">一年级下册 · 可选全部或按单元学习</div>
    <div class="unit-list" id="unitList"></div>
    <button class="btn-start" id="btnStartGame" onclick="startGameWithUnits()">🚀 开始学习</button>
  </div>

  <!-- ====== 保存提示 ====== -->
  <div class="save-toast" id="saveToast">💾 已自动保存</div>

</div>

<script>
// ============================================================
//  生字库  —  人教版一年级下册（约 250 字）
// ============================================================
const ALL_CHARS = [
  // —— 识字 1-4 ——
  { char:'春', pinyin:'chūn', word:'春天' },
  { char:'夏', pinyin:'xià', word:'夏天' },
  { char:'秋', pinyin:'qiū', word:'秋天' },
  { char:'冬', pinyin:'dōng', word:'冬天' },
  { char:'风', pinyin:'fēng', word:'大风' },
  { char:'花', pinyin:'huā', word:'花朵' },
  { char:'雪', pinyin:'xuě', word:'下雪' },
  { char:'月', pinyin:'yuè', word:'月亮' },
  { char:'姓', pinyin:'xìng', word:'姓名' },
  { char:'什', pinyin:'shén', word:'什么' },
  { char:'么', pinyin:'me', word:'什么' },
  { char:'双', pinyin:'shuāng', word:'双手' },
  { char:'国', pinyin:'guó', word:'中国' },
  { char:'王', pinyin:'wáng', word:'大王' },
  { char:'方', pinyin:'fāng', word:'方向' },
  { char:'青', pinyin:'qīng', word:'青草' },
  { char:'清', pinyin:'qīng', word:'清水' },
  { char:'晴', pinyin:'qíng', word:'晴天' },
  { char:'情', pinyin:'qíng', word:'心情' },
  { char:'请', pinyin:'qǐng', word:'请问' },
  { char:'生', pinyin:'shēng', word:'生活' },
  { char:'字', pinyin:'zì', word:'生字' },
  { char:'左', pinyin:'zuǒ', word:'左手' },
  { char:'右', pinyin:'yòu', word:'右手' },
  { char:'红', pinyin:'hóng', word:'红色' },
  { char:'时', pinyin:'shí', word:'时间' },
  { char:'动', pinyin:'dòng', word:'运动' },
  { char:'万', pinyin:'wàn', word:'一万' },
  // —— 课文 1-4 ——
  { char:'吃', pinyin:'chī', word:'吃饭' },
  { char:'忘', pinyin:'wàng', word:'忘记' },
  { char:'井', pinyin:'jǐng', word:'水井' },
  { char:'村', pinyin:'cūn', word:'村子' },
  { char:'叫', pinyin:'jiào', word:'叫声' },
  { char:'毛', pinyin:'máo', word:'毛笔' },
  { char:'主', pinyin:'zhǔ', word:'主人' },
  { char:'席', pinyin:'xí', word:'主席' },
  { char:'乡', pinyin:'xiāng', word:'家乡' },
  { char:'亲', pinyin:'qīn', word:'亲人' },
  { char:'战', pinyin:'zhàn', word:'战士' },
  { char:'士', pinyin:'shì', word:'士兵' },
  { char:'面', pinyin:'miàn', word:'面包' },
  { char:'想', pinyin:'xiǎng', word:'想念' },
  { char:'告', pinyin:'gào', word:'告诉' },
  { char:'诉', pinyin:'sù', word:'告诉' },
  { char:'路', pinyin:'lù', word:'马路' },
  { char:'京', pinyin:'jīng', word:'北京' },
  { char:'安', pinyin:'ān', word:'安全' },
  { char:'门', pinyin:'mén', word:'大门' },
  { char:'广', pinyin:'guǎng', word:'广场' },
  { char:'非', pinyin:'fēi', word:'非常' },

var UNIT_GROUPS = [];
(function buildUnits() {
  var unitDefs = [
    { name: '识字 1-4', start: 0, count: 24 },
    { name: '课文 1-4', start: 24, count: 25 },
    { name: '课文 5-8', start: 49, count: 24 },
    { name: '课文 9-12', start: 73, count: 15 },
    { name: '课文 13-16', start: 88, count: 16 },
    { name: '课文 17-20', start: 104, count: 19 },
    { name: '课文 21-24', start: 123, count: 23 },
    { name: '识字 5-8', start: 146, count: 12 },
    { name: '课文 25-28', start: 158, count: 16 },
  ];
  for (var u = 0; u < unitDefs.length; u++) {
    var def = unitDefs[u];
    var chars = [];
    for (var k = 0; k < def.count; k++) {
      if (def.start + k < ALL_CHARS.length) {
        chars.push(ALL_CHARS[def.start + k]);
      }
    }
    UNIT_GROUPS.push({ name: def.name, chars: chars, selected: true });
  }
})();

// ============================================================
//  HanziWriter 管理
// ============================================================
var hwWriter = null;
var hwCurrentChar = '';

function initHanziWriter(charStr) {
  var container = document.getElementById('charCanvas');
  if (!container) return;
  container.innerHTML = '';
  hwCurrentChar = charStr;
  // 先画一个田字格背景
  var bgHtml = '<svg width="200" height="200" viewBox="0 0 200 200" style="position:absolute;top:0;left:50%;margin-left:-100px;pointer-events:none">';
  bgHtml += '<rect x="0" y="0" width="200" height="200" fill="#fffef7" stroke="#ccc" stroke-width="1"/>';
  bgHtml += '<line x1="100" y1="0" x2="100" y2="200" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,3"/>';
  bgHtml += '<line x1="0" y1="100" x2="200" y2="100" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,3"/>';
  bgHtml += '<line x1="0" y1="0" x2="200" y2="200" stroke="#eee" stroke-width="0.3" stroke-dasharray="2,2"/>';
  bgHtml += '<line x1="200" y1="0" x2="0" y2="200" stroke="#eee" stroke-width="0.3" stroke-dasharray="2,2"/>';
  bgHtml += '</svg>';
  container.innerHTML = bgHtml;
  
  if (typeof HanziWriter === 'undefined' || window.HANZI_WRITER_FAILED) {
    // CDN 加载失败，回退文字
    container.innerHTML += '<div style="font-size:100px;text-align:center;color:#3e2723;padding-top:20px;position:relative;z-index:1">' + charStr + '</div>';
    hwWriter = null;
    return;
  }
  
  try {
    hwWriter = HanziWriter.create('charCanvas', charStr, {
      width: 200,
      height: 200,
      padding: 5,
      strokeColor: '#3e2723',
      strokeAnimationDuration: 500,
      delayBetweenStrokes: 120,
      delayBetweenLoops: 1000,
      radicalColor: null,
      showOutline: true,
      showCharacter: true,
    });
    // 自动播放笔画动画
    setTimeout(function() {
      if (hwWriter) hwWriter.animateCharacter();
    }, 300);
  } catch(e) {
    container.innerHTML += '<div style="font-size:100px;text-align:center;color:#3e2723;padding-top:20px;position:relative;z-index:1">' + charStr + '</div>';
    hwWriter = null;
  }
}

function playStroke() {
  if (hwWriter) { hwWriter.animateCharacter(); }
}

function showFullChar() {
  if (hwWriter) { hwWriter.showCharacter(); }
}

//  状态
// ============================================================
const STORAGE_KEY = 'shengzi_game_v1';

let state = {
  mode: 'normal',           // normal | review
  chars: [],                // 当前学习队列
  passSet: new Set(),       // 认识的字
  failSet: new Set(),       // 不会的字
  currentIndex: 0,
  shuffled: false,
  hintVisible: false,
  isResult: false,
  // 需要序列化到 localStorage 的额外数据
  shuffledOrder: [],        // 打乱后的字符索引顺序
  autoListen: false,        // 自动跟读模式
  _continueLearning: false,  // 全部判完后继续练不会的字
};

// ============================================================
//  自动保存
// ============================================================
function saveState() {
  try {
    const save = {
      version: 1,
      timestamp: Date.now(),
      passList: Array.from(state.passSet),
      failList: Array.from(state.failSet),
      shuffledOrder: state.shuffledOrder,
      currentIndex: state.currentIndex,
      mode: state.mode,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(save));
  } catch (e) {
    // localStorage 不可用时静默忽略
  }
}

function showSaveToast() {
  const el = document.getElementById('saveToast');
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 1200);
}

function autoSave() {
  saveState();
  showSaveToast();
}

function loadSavedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const save = JSON.parse(raw);
    if (!save || !save.version) return null;
    return save;
  } catch (e) {
    return null;
  }
}

function clearSavedState() {
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (e) {}
}

// ============================================================
//  函数
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function initGame(fromSaved, unitChars) {
  if (!fromSaved) {
    state.passSet = new Set();
    state.failSet = new Set();
    state.hintVisible = false;
    state.isResult = false;
    state.mode = 'normal';

    // 使用选中的字
    var sourceChars = unitChars || ALL_CHARS;
    state.chars = shuffle([...sourceChars]);
    state.shuffledOrder = state.chars.map(c => ALL_CHARS.indexOf(c));
    state.shuffled = true;
    state.currentIndex = 0;
    state.autoListen = false;
    state._continueLearning = false;

    clearSavedState();
  }
  stopListen();

  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('cardZone').style.display = 'flex';
  document.getElementById('resumeOverlay').classList.remove('show');
  document.getElementById('unitPicker').classList.add('hidden');
  render();
}

// ============================================================
//  单元选择
// ============================================================
function renderUnitPicker() {
  var listEl = document.getElementById('unitList');
  if (!listEl) return;
  var totalChars = 0;
  UNIT_GROUPS.forEach(function(g) { totalChars += g.chars.length; });
  var allSelected = UNIT_GROUPS.every(function(g) { return g.selected; });
  var html = '';
  // 全部选项
  html += '<div class="unit-item select-all' + (allSelected ? ' selected' : '') + '" onclick="toggleAllUnits()">';
  html += '  <div class="checkbox">' + (allSelected ? '\u2713' : '') + '</div>';
  html += '  <div class="unit-name">\u5168\u90E8\u5B66\u4E60</div>';
  html += '  <div class="unit-count">' + totalChars + ' \u4E2A\u5B57</div></div>';
  // 每个单元
  for (var i = 0; i < UNIT_GROUPS.length; i++) {
    var g = UNIT_GROUPS[i];
    html += '<div class="unit-item' + (g.selected ? ' selected' : '') + '" onclick="toggleUnit(' + i + ')">';
    html += '  <div class="checkbox">' + (g.selected ? '\u2713' : '') + '</div>';
    html += '  <div class="unit-name">' + g.name + '</div>';
    html += '  <div class="unit-count">' + g.chars.length + ' \u4E2A\u5B57</div></div>';
  }
  listEl.innerHTML = html;
  updateStartBtn();
}

function toggleAllUnits() {
  var allSelected = UNIT_GROUPS.every(function(g) { return g.selected; });
  var newVal = !allSelected;
  UNIT_GROUPS.forEach(function(g) { g.selected = newVal; });
  renderUnitPicker();
}

function toggleUnit(idx) {
  UNIT_GROUPS[idx].selected = !UNIT_GROUPS[idx].selected;
  renderUnitPicker();
}

function updateStartBtn() {
  var btn = document.getElementById('btnStartGame');
  if (!btn) return;
  var anySelected = UNIT_GROUPS.some(function(g) { return g.selected; });
  btn.disabled = !anySelected;
  btn.textContent = anySelected ? '\uD83D\uDE80 \u5F00\u59CB\u5B66\u4E60' : '\u2705 \u8BF7\u9009\u62E9\u81F3\u5C11\u4E00\u4E2A\u5355\u5143';
}

function startGameWithUnits() {
  var selected = [];
  UNIT_GROUPS.forEach(function(g) {
    if (g.selected) {
      g.chars.forEach(function(c) { selected.push(c); });
    }
  });
  if (selected.length === 0) return;
  // 去重（防止单元间有重复字）
  var seen = {};
  var deduped = [];
  for (var i = 0; i < selected.length; i++) {
    if (!seen[selected[i].char]) {
      seen[selected[i].char] = true;
      deduped.push(selected[i]);
    }
  }
  initGame(false, deduped);
}

function getOrderedChars() {
  // 从 localStorage 恢复时，用保存的顺序
  if (state.shuffledOrder && state.shuffledOrder.length > 0) {
    return state.shuffledOrder.map(i => ALL_CHARS[i]).filter(Boolean);
  }
  return shuffle([...ALL_CHARS]);
}

function render() {
  const { chars, currentIndex, passSet, failSet, isResult } = state;

  // 统计（用当前学习队列的总数）
  document.getElementById('passCount').textContent = passSet.size;
  document.getElementById('failCount').textContent = failSet.size;
  var leftTotal = state.chars.length;
  document.getElementById('leftCount').textContent = leftTotal - passSet.size - failSet.size;

  // 进度条
  var done = passSet.size + failSet.size;
  var pct = leftTotal > 0 ? (done / leftTotal) * 100 : 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${leftTotal}`;

  // 如果已经全部判完 → 结算
  if (isResult || currentIndex >= chars.length) {
    showResult();
    return;
  }

  const item = chars[currentIndex];

  // 跳过已判定的字：复习模式/继续学习只跳过已认识，闯关模式两者都跳
  var skipFailInNormal = state.mode === 'review' || state._continueLearning;
  if (skipFailInNormal ? passSet.has(item.char) : (passSet.has(item.char) || failSet.has(item.char))) {
    state.currentIndex++;
    render();
    return;
  }

  // 显示字（田字格 + 笔画）
  initHanziWriter(item.char);
  document.getElementById('pinyin').textContent = '';
  document.getElementById('words').textContent = '';
  state.hintVisible = false;

  // 重置跟读状态
  if (!state.autoListen) {
    setListenStatus('🎤 点跟读按钮开始', 'result-wait');
  }
  updateMicBtn(true, false);

  // 按钮
  document.getElementById('btnRow').innerHTML = `
    <button class="btn btn-pass" onclick="markPass()">✅ 认识</button>
    <button class="btn btn-fail" onclick="markFail()">❌ 不会</button>
    <button class="btn btn-mic btn-sm" id="micBtn" onclick="toggleListen()">${state.autoListen ? '🔁 自动跟读中' : '🎤 跟读'}</button>
    <button class="btn btn-hint btn-sm" onclick="showHint()">💡 提示</button>
  `;

  document.getElementById('cardZone').style.display = 'flex';
  document.getElementById('resultScreen').classList.remove('show');
}

function markPass() {
  stopListen();
  if (state.isResult) return;
  const item = state.chars[state.currentIndex];
  if (!item) return;
  state.passSet.add(item.char);
  state.failSet.delete(item.char);
  state.currentIndex++;
  autoSave();
  render();
}

function markFail() {
  stopListen();
  if (state.isResult) return;
  const item = state.chars[state.currentIndex];
  if (!item) return;
  state.failSet.add(item.char);
  state.currentIndex++;
  autoSave();
  render();
}

function showHint() {
  if (state.isResult) return;
  const item = state.chars[state.currentIndex];
  if (!item) return;
  state.hintVisible = true;
  document.getElementById('pinyin').textContent = item.pinyin;
  document.getElementById('words').textContent = '💡 ' + item.word;
}

function showResult() {
  state.isResult = true;
  document.getElementById('cardZone').style.display = 'none';
  document.getElementById('resumeOverlay').classList.remove('show');

  var total = state.chars.length || ALL_CHARS.length;
  var pass = state.passSet.size;
  var fail = state.failSet.size;
  var studied = pass + fail;
  var pct = studied > 0 ? Math.round((pass / studied) * 100) : 0;

  let emoji, title;
  if (pct >= 90) { emoji = '🏆'; title = '太棒啦！生字小达人！'; }
  else if (pct >= 70) { emoji = '🌟'; title = '不错哦！继续加油！'; }
  else if (pct >= 50) { emoji = '💪'; title = '还可以，要多练练！'; }
  else { emoji = '😅'; title = '还要加油哦！🦐 小钳仙陪你练！'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultDetail').innerHTML =
    `共 <span class="green">${pass}</span> 个认识，
     <span class="red">${fail}</span> 个不会，
     正确率 <span class="green">${pct}%</span>`;

  // 错字本
  const wrongArr = Array.from(state.failSet);
  if (wrongArr.length > 0) {
    document.getElementById('wrongListWrap').style.display = 'block';
    document.getElementById('wrongWords').innerHTML =
      wrongArr.map(c => `<span class="wrong-word-tag">${c}</span>`).join('');
  } else {
    document.getElementById('wrongListWrap').style.display = 'none';
  }

  const screen = document.getElementById('resultScreen');
  screen.classList.add('show');

  // 关闭麦克风和自动跟读
  stopListen();
  state.autoListen = false;
  state._continueLearning = false;

  // 通关后清除存档（以示庆祝）
  clearSavedState();
}

function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-toggle .btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mode-toggle .btn[data-mode="${mode}"]`).classList.add('active');

  if (mode === 'review') {
    stopListen();
    state.autoListen = false;
    state._continueLearning = false;
    // 复习模式：只看错字
    const wrongArr = Array.from(state.failSet);
    if (wrongArr.length === 0) {
      alert('🎉 没有错字，你太棒了！');
      setMode('normal');
      return;
    }
    const wrongChars = new Set(wrongArr);
    state.chars = shuffle(ALL_CHARS.filter(c => wrongChars.has(c.char)));
    state.shuffledOrder = state.chars.map(c => ALL_CHARS.indexOf(c));
    state.currentIndex = 0;
    state.hintVisible = false;
    state.isResult = false;
    document.getElementById('resultScreen').classList.remove('show');
    document.getElementById('cardZone').style.display = 'flex';
    autoSave();
    render();
  } else {
    stopListen();
    state.autoListen = false;
    // 闯关模式：全新打乱完整队列，不受复习模式干扰
    state.chars = shuffle([...ALL_CHARS]);
    state.shuffledOrder = state.chars.map(function(c) { return ALL_CHARS.indexOf(c); });
    state.currentIndex = 0;

    // 如果所有字都判完了但有不会的，直接变成继续学习不熟的字
    var totalDone = state.passSet.size + state.failSet.size;
    var totalChars = state.chars.length || ALL_CHARS.length;
    if (totalDone >= totalChars && state.failSet.size > 0) {
      var wrongList = Array.from(state.failSet);
      var wrongSet = new Set(wrongList);
      state.chars = shuffle(ALL_CHARS.filter(function(c) { return wrongSet.has(c.char); }));
      state.shuffledOrder = state.chars.map(function(c) { return ALL_CHARS.indexOf(c); });
    }

    state.hintVisible = false;
    state.isResult = false;
    // 闯关模式对复习序列不跳过 failSet，让用户继续练
    state._continueLearning = totalDone >= (state.chars.length || ALL_CHARS.length) && state.failSet.size > 0;
    document.getElementById('resultScreen').classList.remove('show');
    document.getElementById('cardZone').style.display = 'flex';
    autoSave();
    render();
  }
}

function restartAll() {
  if (!confirm('确定要重新开始吗？之前的成绩会清零。')) return;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('unitPicker').classList.remove('hidden');
  renderUnitPicker();
}

function reviewWrong() {
  stopListen();
  state.autoListen = false;
  const wrongArr = Array.from(state.failSet);
  if (wrongArr.length === 0) {
    alert('🎉 没有错字！');
    return;
  }
  state.mode = 'review';
  const wrongChars = new Set(wrongArr);
  state.chars = shuffle(ALL_CHARS.filter(c => wrongChars.has(c.char)));
  state.shuffledOrder = state.chars.map(c => ALL_CHARS.indexOf(c));
  state.currentIndex = 0;
  state.hintVisible = false;
  state.isResult = false;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('cardZone').style.display = 'flex';
  document.querySelectorAll('.mode-toggle .btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.mode-toggle .btn[data-mode="review"]').classList.add('active');
  autoSave();
  render();
}

// ============================================================
// ============================================================
//  语音跟读（Web Speech API）
// ============================================================
var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var IS_SPEECH_SUPPORTED = !!SpeechRecognition;
var recognition = null;
var listenAttempts = 0;
var MAX_LISTEN_ATTEMPTS = 3;

function setListenStatus(text, className) {
  var el = document.getElementById('listenStatus');
  if (el) {
    el.textContent = text;
    el.className = 'listen-status' + (className ? ' ' + className : '');
  }
}

function updateMicBtn(enabled, listening) {
  var btn = document.getElementById('micBtn');
  if (!IS_SPEECH_SUPPORTED) {
    if (btn) {
      btn.className = 'btn btn-mic-unsupported btn-sm';
      btn.textContent = '\u{1F3A4} \u4E0D\u652F\u6301';
    }
    setListenStatus('\u26A0\uFE0F \u8BED\u97F3\u8BC6\u522B\u4E0D\u53EF\u7528\uFF0C\u8BF7\u7528 Chrome', 'result-fail');
    return;
  }
  if (!btn) return;
  // Always clickable so user can stop anytime
  btn.disabled = false;
  if (listening) {
    btn.classList.add('listening-active');
    btn.textContent = '\u{1F534} \u8046\u542C\u4E2D...';
  } else if (state.autoListen) {
    btn.classList.remove('listening-active');
    btn.textContent = '\u{1F501} \u81EA\u52A8\u8DDF\u8BFB\u4E2D';
  } else {
    btn.classList.remove('listening-active');
    btn.textContent = '\u{1F3A4} \u8DDF\u8BFB';
  }
}

function stopListen() {
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
  clearTimeout(state._autoListenTimer);
  state._autoListenTimer = null;
}

// Start listening for the current character.
// After result is processed, advances to next if autoListen is on.
function startListen() {
  if (!IS_SPEECH_SUPPORTED) {
    setListenStatus('\u26A0\uFE0F \u8BF7\u7528 Chrome \u6D4F\u89C8\u5668', 'result-fail');
    return;
  }
  if (state.isResult) return;
  var idx = state.currentIndex;
  var item = state.chars[idx];
  if (!item) return;

  stopListen();
  listenAttempts = 0;

  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;

  updateMicBtn(false, true);
  setListenStatus('\u{1F3A4} \u8BF7\u5927\u58F0\u8BFB\u51FA\u8FD9\u4E2A\u5B57...', 'listening');

  var finalTranscript = '';
  var done = false;
  var selfIdx = idx; // capture current char index

  recognition.onresult = function(event) {
    for (var i = event.resultIndex; i < event.results.length; i++) {
      var r = event.results[i];
      if (r.isFinal) {
        finalTranscript += r[0].transcript;
      }
    }
    if (finalTranscript) {
      setListenStatus('\u{1F3A4} \u542C\u5230: \u300C' + finalTranscript + '\u300D', 'listening');
    }
  };

  recognition.onerror = function(event) {
    if (done) return;
    done = true;
    if (event.error === 'not-allowed') {
      state.autoListen = false;
      updateMicBtn(true, false);
      setListenStatus('\u26A0\uFE0F \u8BF7\u5141\u8BB8\u9EA6\u514B\u98CE', 'result-fail');
    } else {
      processResult(selfIdx, null, '\u5FAE\u97E2\u5931\u8D25');
    }
  };

  recognition.onend = function() {
    if (done) return;
    done = true;
    processResult(selfIdx, finalTranscript, '\u6CA1\u542C\u5230');
  };

  try {
    recognition.start();
  } catch (e) {
    state.autoListen = false;
    updateMicBtn(true, false);
    setListenStatus('\u26A0\uFE0F \u9EA6\u514B\u98CE\u5931\u8D25: ' + e.message, 'result-fail');
    // \u5931\u8D25\u65F6\u91CD\u5EFA\u5B9E\u4F8B\uff0C\u4E0B\u6B21\u91CD\u8BD5
    if (e.name === 'InvalidStateError' || e.message.indexOf('already') > -1) {
      recognition = null;
    }
  }
}

function processResult(idx, text, failReason) {
  // Check if we're still on the same character
  if (state.isResult) return;
  if (state.currentIndex !== idx) return; // user already moved on

  if (text) {
    var clean = text.trim().replace(/[\u3000\u3001\u3002\uFF0C\uFF01\uFF1F\uFF1B\uFF1A\u201C\u201D\u2018\u2019\s\uFEFF\u200B]/g, '');
    if (clean.indexOf(state.chars[idx].char) !== -1) {
      // Match!
      var matchChar = state.chars[idx].char;
      setListenStatus('\u2705 \u8BFB\u5BF9\u4E86\uFF01', 'result-pass');
      state.passSet.add(matchChar);
      state.failSet.delete(matchChar);
      state.currentIndex++;
      autoSave();
      scheduleNext(500);
      return;
    }
  }

  // No match or no speech
  listenAttempts++;
  if (listenAttempts >= MAX_LISTEN_ATTEMPTS) {
    var theChar = state.chars[idx].char;
    var heard = text ? '\u300C' + text.trim() + '\u300D' : '';
    setListenStatus('\u274C \u8BB0\u4E3A\u4E0D\u8BA4\u8BC6' + (heard ? heard : ''), 'result-fail');
    state.failSet.add(theChar);
    state.passSet.delete(theChar);
    state.currentIndex++;
    autoSave();
    scheduleNext(800);
  } else {
    var n = MAX_LISTEN_ATTEMPTS - listenAttempts;
    if (text) {
      setListenStatus('\u{1F914} \u518D\u8BD5\u4E00\u6B21\uFF08\u8FD8\u5269' + n + '\u6B21\uFF09', 'result-fail');
    } else {
      setListenStatus('\u{1F507} \u518D\u8BD5\u4E00\u6B21\uFF08\u8FD8\u5269' + n + '\u6B21\uFF09', 'listening');
    }
    if (state.autoListen) {
      clearTimeout(state._autoListenTimer);
      state._autoListenTimer = setTimeout(function() { startListen(); }, 1200);
    } else {
      updateMicBtn(true, false);
    }
  }
}

function scheduleNext(delay) {
  if (!state.autoListen) {
    updateMicBtn(true, false);
    // Re-render after manual actions
    renderAfterMark();
    return;
  }
  // Auto-listen: wait, then render the next char and auto-start mic
  clearTimeout(state._autoListenTimer);
  state._autoListenTimer = setTimeout(function() {
    if (state.currentIndex >= state.chars.length) {
      showResult();
      return;
    }
    renderNextAndListen();
  }, delay + 200);
}

function renderNextAndListen() {
  var chars = state.chars;
  var idx = state.currentIndex;
  if (idx >= chars.length) {
    showResult();
    return;
  }
  // Skip already-marked chars (review mode: only skip passed ones)
  var skipFail = state.mode === 'review' || state._continueLearning;
  while (idx < chars.length && (skipFail ? state.passSet.has(chars[idx].char) : (state.passSet.has(chars[idx].char) || state.failSet.has(chars[idx].char)))) {
    idx++;
    state.currentIndex = idx;
  }
  if (idx >= chars.length) {
    showResult();
    return;
  }
  // Render the char
  renderFresh(idx);
  // Auto-start mic after a brief pause (only if still in autoListen mode)
  clearTimeout(state._autoListenTimer);
  if (state.autoListen) {
    state._autoListenTimer = setTimeout(function() {
      startListen();
    }, 2000);
  }
}

function renderFresh(idx) {
  var chars = state.chars;
  var passCount = state.passSet.size;
  var failCount = state.failSet.size;
  var total = state.chars.length || ALL_CHARS.length;

  document.getElementById('passCount').textContent = passCount;
  document.getElementById('failCount').textContent = failCount;
  document.getElementById('leftCount').textContent = total - passCount - failCount;

  var done = passCount + failCount;
  document.getElementById('progressBar').style.width = (total > 0 ? (done / total * 100) : 0) + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total;

  var item = chars[idx];
  document.getElementById('mainChar').textContent = item.char;
  document.getElementById('pinyin').textContent = '';
  document.getElementById('words').textContent = '';
  state.hintVisible = false;

  setListenStatus(state.autoListen ? '\u{1F3A4} \u5373\u5C06\u8046\u542C...' : '\u{1F3A4} \u70B9\u8DDF\u8BFB\u5F00\u59CB', 'result-wait');
  updateMicBtn(true, false);

  document.getElementById('btnRow').innerHTML = [
    '<button class="btn btn-pass" onclick="markPass()">\u2705 \u8BA4\u8BC6</button>',
    '<button class="btn btn-fail" onclick="markFail()">\u274C \u4E0D\u4F1A</button>',
    '<button class="btn btn-mic btn-sm" id="micBtn" onclick="toggleListen()">' + (state.autoListen ? '\u{1F501} \u81EA\u52A8\u8DDF\u8BFB\u4E2D' : '\u{1F3A4} \u8DDF\u8BFB') + '</button>',
    '<button class="btn btn-hint btn-sm" onclick="showHint()">\u{1F4A1} \u63D0\u793A</button>'
  ].join('');

  document.getElementById('cardZone').style.display = 'flex';
  document.getElementById('resultScreen').classList.remove('show');
}

function renderAfterMark() {
  var chars = state.chars;
  var idx = state.currentIndex;

  // Skip already-marked chars (review mode: only skip passed ones)
  var skipFail = state.mode === 'review' || state._continueLearning;
  while (idx < chars.length && (skipFail ? state.passSet.has(chars[idx].char) : (state.passSet.has(chars[idx].char) || state.failSet.has(chars[idx].char)))) {
    idx++;
    state.currentIndex = idx;
  }

  if (idx >= chars.length) {
    showResult();
    return;
  }
  renderFresh(idx);
}

function toggleListen() {
  if (!IS_SPEECH_SUPPORTED) return;

  // Always stop any active recognition first
  stopListen();

  if (state.autoListen) {
    // Turn OFF
    state.autoListen = false;
    updateMicBtn(true, false);
    setListenStatus('\u{1F6D1} \u5DF2\u5173\u95ED', 'result-wait');
  } else {
    // Turn ON
    state.autoListen = true;
    updateMicBtn(true, false);
    startListen();
  }
}

function resumeGame() {
  const saved = loadSavedState();
  if (!saved) {
    initGame(false);
    return;
  }
  state.passSet = new Set(saved.passList || []);
  state.failSet = new Set(saved.failList || []);
  state.mode = saved.mode || 'normal';
  state.currentIndex = saved.currentIndex || 0;
  state.hintVisible = false;
  state.isResult = false;
  state.autoListen = false;
  // 用全新打乱，避免保存时的复习队列污染
  state.chars = shuffle([...ALL_CHARS]);
  state.shuffledOrder = state.chars.map(function(c) { return ALL_CHARS.indexOf(c); });
  document.querySelectorAll('.mode-toggle .btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.mode-toggle .btn[data-mode="' + state.mode + '"]').classList.add('active');
  document.getElementById('resumeOverlay').classList.remove('show');
  document.getElementById('cardZone').style.display = 'flex';
  render();
}

function showUnitPicker() {
  document.getElementById('resumeOverlay').classList.remove('show');
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('unitPicker').classList.remove('hidden');
  renderUnitPicker();
}

function clearAndStart() {
  if (!confirm('确定要重新开始吗？上次的成绩会被清除。')) return;
  document.getElementById('resumeOverlay').classList.remove('show');
  document.getElementById('unitPicker').classList.remove('hidden');
  renderUnitPicker();
}

// ============================================================
function checkSavedData() {
  const saved = loadSavedState();
  if (saved) {
    const pass = (saved.passList || []).length;
    const fail = (saved.failList || []).length;
    const total = ALL_CHARS.length;
    const done = pass + fail;

    document.getElementById('resumeInfo').innerHTML =
      `你已经认识了 <strong>${pass}</strong> 个字，` +
      `还有 <strong>${fail}</strong> 个不会`;

    document.getElementById('resumeProgressFill').style.width =
      total > 0 ? (done / total * 100) + '%' : '0%';

    if (done >= total) {
      state.passSet = new Set(saved.passList || []);
      state.failSet = new Set(saved.failList || []);
      state.chars = [];
      state.currentIndex = 0;
      showResult();
      return;
    }

    document.getElementById('resumeOverlay').classList.add('show');
    return;
  }
  // 无存档 → 显示单元选择
  renderUnitPicker();
}

// ============================================================
//  启动
// ============================================================
checkSavedData();
</script>
</body>
</html>
